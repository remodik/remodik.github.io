<!doctype html>
<html lang="ru">

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Портфолио</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Inter", "Segoe UI", sans-serif;
                background: linear-gradient(
                    135deg,
                    #0f0f23 0%,
                    #1a1a2e 50%,
                    #0f0f23 100%
                );
                color: #e0e0e0;
                min-height: 100vh;
                overflow-x: hidden;
            }
            .particles {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 0;
            }
            .particle {
                position: absolute;
                width: 2px;
                height: 2px;
                background: #00d4ff;
                border-radius: 50%;
                opacity: 0.3;
                animation: float 20s infinite;
            }
            @keyframes float {
                0%,
                100% {
                    transform: translateY(0) translateX(0);
                }
                25% {
                    transform: translateY(-100px) translateX(50px);
                }
                50% {
                    transform: translateY(-50px) translateX(-50px);
                }
                75% {
                    transform: translateY(-150px) translateX(100px);
                }
            }
            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 20px;
                position: relative;
                z-index: 1;
            }
            .header {
                text-align: center;
                padding: 60px 20px 40px;
                position: relative;
            }
            .header::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 300px;
                height: 300px;
                background: radial-gradient(
                    circle,
                    rgba(0, 212, 255, 0.15) 0%,
                    transparent 70%
                );
                border-radius: 50%;
                animation: pulse 3s ease-in-out infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    transform: translateX(-50%) scale(1);
                    opacity: 0.5;
                }
                50% {
                    transform: translateX(-50%) scale(1.1);
                    opacity: 0.7;
                }
            }
            .header-content {
                position: relative;
                z-index: 1;
            }
            h1 {
                font-size: clamp(2.5em, 5vw, 4em);
                background: linear-gradient(135deg, #00d4ff, #7b2cbf, #00d4ff);
                background-size: 200% auto;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 20px;
                animation: gradient 3s ease infinite;
            }
            @keyframes gradient {
                0%,
                100% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
            }
            .subtitle {
                font-size: 1.3em;
                color: #a0a0a0;
                margin-bottom: 10px;
            }
            .student-info {
                display: inline-block;
                margin-top: 20px;
                padding: 15px 30px;
                background: rgba(0, 212, 255, 0.1);
                border: 1px solid rgba(0, 212, 255, 0.3);
                border-radius: 50px;
                font-size: 1.1em;
            }
            .stats {
                display: flex;
                justify-content: center;
                gap: 40px;
                margin-top: 40px;
                flex-wrap: wrap;
            }
            .stat-item {
                text-align: center;
                padding: 20px;
                background: rgba(0, 212, 255, 0.05);
                border-radius: 15px;
                min-width: 150px;
            }
            .stat-number {
                font-size: 2.5em;
                font-weight: bold;
                background: linear-gradient(135deg, #00d4ff, #7b2cbf);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .stat-label {
                color: #a0a0a0;
                margin-top: 5px;
            }
            .section-tabs {
                display: flex;
                justify-content: center;
                gap: 14px;
                margin-top: 50px;
                flex-wrap: wrap;
            }
            .section-tab {
                padding: 14px 30px;
                border-radius: 14px;
                border: 2px solid rgba(0, 212, 255, 0.3);
                background: rgba(0, 212, 255, 0.06);
                color: #a0c8e0;
                font-size: 1em;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            .section-tab:hover {
                border-color: rgba(0, 212, 255, 0.6);
                background: rgba(0, 212, 255, 0.12);
                color: #e5f6ff;
            }
            .section-tab.active {
                background: linear-gradient(
                    135deg,
                    rgba(0, 212, 255, 0.25),
                    rgba(123, 44, 191, 0.2)

                border-color: #00d4ff;
                color: #fff;
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            }
            .section-tab.commercial.active {
                background: linear-gradient(
                    135deg,
                    rgba(255, 170, 0, 0.25),
                    rgba(255, 100, 0, 0.15)
                );
                border-color: #ffaa00;
                color: #fff;
                box-shadow: 0 0 20px rgba(255, 170, 0, 0.2);
            }
            .subject-filter {
                margin-top: 28px;
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 12px;
                min-height: 48px;
            }
            .subject-btn {
                border: 1px solid rgba(0, 212, 255, 0.35);
                background: rgba(0, 212, 255, 0.08);
                color: #b8dfff;
                border-radius: 999px;
                padding: 10px 16px;
                font-size: 0.95em;
                cursor: pointer;
                transition: all 0.25s ease;
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }
            .subject-btn:hover {
                background: rgba(0, 212, 255, 0.16);
                border-color: rgba(0, 212, 255, 0.6);
                color: #e5f6ff;
            }
            .subject-btn.active {
                background: linear-gradient(135deg, #00d4ff, #0099cc);
                border-color: transparent;
                color: #fff;
                box-shadow: 0 8px 22px rgba(0, 212, 255, 0.3);
            }
            .subject-count {
                font-size: 0.8em;
                padding: 3px 8px;
                border-radius: 999px;
                background: rgba(0, 0, 0, 0.25);
            }
            .works-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
                gap: 30px;
                margin-top: 50px;
            }
            .work-card {
                background: linear-gradient(
                    145deg,
                    rgba(22, 33, 62, 0.9),
                    rgba(26, 26, 46, 0.9)
                );
                border-radius: 20px;
                padding: 30px;
                border: 1px solid rgba(0, 212, 255, 0.2);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                cursor: pointer;
                position: relative;
                overflow: hidden;
            }
            .work-card.commercial {
                border-color: rgba(255, 170, 0, 0.25);
                background: linear-gradient(
                    145deg,
                    rgba(35, 28, 15, 0.9),
                    rgba(26, 22, 10, 0.9)

            }
            .work-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(0, 212, 255, 0.08),
                    transparent

                transition: left 0.5s ease;

            .work-card.commercial::before {
                background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 170, 0, 0.08),
                    transparent

            }
            .work-card:hover::before {
                left: 100%;
            }
            .work-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 20px 50px rgba(0, 212, 255, 0.3);
                border-color: rgba(0, 212, 255, 0.5);
            }
            .work-card.commercial:hover {
                box-shadow: 0 20px 50px rgba(255, 170, 0, 0.2);
                border-color: rgba(255, 170, 0, 0.5);
            }

                right: 16px;

                align-items: center;
                gap: 6px;

                background: rgba(0, 212, 255, 0.12);

                font-size: 0.75em;

            }
            .subject-badge.com {

                align-items: center;
                justify-content: center;

                margin-top: 20px;
                margin-bottom: 20px;

            .work-icon.com {
                background: linear-gradient(135deg, #ffaa00, #ff6600);
            }
            .work-icon svg {
                width: 32px;
                height: 32px;
                stroke: currentColor;
                stroke-width: 2;
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .work-card:hover .work-icon {
                transform: rotate(10deg) scale(1.1);
            }
            .work-date {
                font-size: 0.9em;
                color: #00d4ff;
                margin-bottom: 10px;

            }
            .work-date.com {

            }
            .work-title {

                margin-bottom: 12px;
                color: #fff;
            }
            .work-description {
                color: #a0a0a0;

                font-size: 0.93em;

            .work-link {

                border-radius: 10px;

            .work-link:hover {

            }

                background: linear-gradient(135deg, #c9a227, #8b7317);
            }
            .work-link.orange {
                background: linear-gradient(135deg, #ffaa00, #ff6600);
            }
            .work-link.orange:hover {
                box-shadow: 0 5px 15px rgba(255, 170, 0, 0.4);
            }
            .empty-state {
                margin-top: 30px;
                padding: 40px;
                border-radius: 18px;
                border: 1px dashed rgba(0, 212, 255, 0.4);
                text-align: center;
                color: #9bc9dc;
                background: rgba(0, 212, 255, 0.06);
                display: none;
            }
            .footer {
                text-align: center;
                padding: 60px 20px 40px;
                color: #666;
            }
            .footer a {
                color: #00d4ff;
                text-decoration: none;
            }
            @media (max-width: 768px) {
                .works-grid {
                    grid-template-columns: 1fr;
                    margin-top: 36px;
                }
                .section-tabs {
                    gap: 10px;
                }
                .section-tab {
                    padding: 11px 20px;
                    font-size: 0.9em;
                }
            }
        </style>
    </head>

            const subjectMeta = {
                "Обеспечение качества функционирования компьютерных систем": {
                    icon: "shield",
                },

                "Управление программными проектами": { icon: "briefcase" },
            };

            let selectedSubject = "all";

            function switchSection(s) {
                document.getElementById("section-edu").style.display =
                    s === "edu" ? "block" : "none";
                document.getElementById("section-com").style.display =
                    s === "com" ? "block" : "none";
                document
                    .querySelectorAll(".section-tab")
                    .forEach((t) =>
                        t.classList.toggle("active", t.dataset.section === s),
                    );
            }

            function tags(arr) {
                return arr
                    .map((t) => {
                        const o = typeof t === "string" ? { label: t } : t;
                        return `<span class="tag${o.variant === "gold" ? " gold" : o.variant === "orange" ? " orange" : ""}">${o.label}</span>`;
                    })
                    .join("");
            }

            function buildSubjectButtons() {
                const counts = new Map();
                works.forEach((w) =>
                    counts.set(w.subject, (counts.get(w.subject) || 0) + 1),
                );
                const btns = [
                    {
                        id: "all",
                        title: "Все предметы",
                        count: works.length,
                        icon: "books",
                    },
                    ...Array.from(counts.entries()).map(([s, c]) => ({
                        id: s,
                        title: s,
                        count: c,
                        icon: subjectMeta[s]?.icon || "book",
                    })),
                ];
                document.getElementById("subjectFilter").innerHTML = btns
                    .map(
                        (b) => `
			<button class="subject-btn${b.id === selectedSubject ? " active" : ""}" data-subject="${b.id}">
				<span style="width:16px;height:16px;display:inline-flex;align-items:center;">${I(b.icon)}</span>
				<span>${b.title}</span><span class="subject-count">${b.count}</span>
			</button>`,
                    )
                    .join("");
                document.querySelectorAll(".subject-btn").forEach((btn) =>
                    btn.addEventListener("click", () => {
                        selectedSubject = btn.dataset.subject;
                        buildSubjectButtons();
                        renderWorks();
                    }),
                );
            }

            function renderWorks() {
                const list =
                    selectedSubject === "all"
                        ? works
                        : works.filter((w) => w.subject === selectedSubject);
                document.getElementById("worksGrid").innerHTML = list
                    .map(
                        (w) => `
			<article class="work-card" onclick="location.href='${w.url}'">
				<div class="subject-badge"><span style="width:14px;height:14px;display:inline-flex;">${I(subjectMeta[w.subject]?.icon || "book")}</span><span>${w.subject}</span></div>
				<div class="work-icon"${w.iconStyle ? ` style="${w.iconStyle}"` : ""} >${I(w.icon)}</div>
				<div class="work-date">${w.date}</div>
				<h3 class="work-title">${w.title}</h3>
				<p class="work-description">${w.description}</p>
				<div class="work-tags">${tags(w.tags)}</div>
				<a href="${w.url}" class="work-link${w.linkVariant === " gold" ? " gold" : ""}" onclick="event.stopPropagation()">Открыть работу →</a>
			</article>`,
                    )
                    .join("");
                document.getElementById("emptyState").style.display =
                    list.length ? "none" : "block";
            }

            function renderCommercial() {
                document.getElementById("commercialGrid").innerHTML = commercial
                    .map(
                        (w) => `
			<article class="work-card commercial" onclick="location.href='${w.url}'">
				<div class="subject-badge com"><span style="width:14px;height:14px;display:inline-flex;">${I("briefcase")}</span><span>Коммерческий проект</span></div>
				<div class="work-icon com">${I(w.icon)}</div>
				<div class="work-date com">Март 2026</div>
				<h3 class="work-title">${w.title}</h3>
				<p class="work-description">${w.description}</p>
				<div class="work-tags">${tags(w.tags)}</div>
				<a href="${w.url}" class="work-link orange" onclick="event.stopPropagation()">Открыть проект →</a>
			</article>`,
                    )
                    .join("");
            }

            function fillStats() {
                document.getElementById("workCount").textContent =
                    works.length + commercial.length;
                document.getElementById("commercialCount").textContent =
                    commercial.length;
                document.getElementById("subjectCount").textContent = new Set(
                    works.map((w) => w.subject),
                ).size;
            }

            function createParticles() {
                const c = document.getElementById("particles");
                for (let i = 0; i < 50; i++) {
                    const p = document.createElement("div");
                    p.className = "particle";
                    p.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;animation-delay:${Math.random() * 20}s`;
                    c.appendChild(p);
                }
            }

            function typeWriter() {
                const el = document.getElementById("mainTitle"),
                    text = el.textContent;
                el.textContent = "";
                let i = 0;
                const t = setInterval(() => {
                    if (i < text.length) {
                        el.textContent += text[i++];
                    } else clearInterval(t);
                }, 80);
            }

            document.addEventListener("DOMContentLoaded", () => {
                createParticles();
                buildSubjectButtons();
                renderWorks();
                renderCommercial();
                fillStats();
                typeWriter();
            });
