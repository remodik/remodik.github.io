<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практические работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #0f0f23 100%);
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00d4ff;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-100px) translateX(50px); }
            50% { transform: translateY(-50px) translateX(-50px); }
            75% { transform: translateY(-150px) translateX(100px); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 20px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.5; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 0.7; }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2.5em, 5vw, 4em);
            background: linear-gradient(135deg, #00d4ff, #7b2cbf, #00d4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: gradient 3s ease infinite;
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1.3em;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        .student-info {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 50px;
            font-size: 1.1em;
        }

        .subject-filter {
            margin-top: 45px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .subject-btn {
            border: 1px solid rgba(0, 212, 255, 0.35);
            background: rgba(0, 212, 255, 0.08);
            color: #b8dfff;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .subject-btn:hover {
            background: rgba(0, 212, 255, 0.16);
            border-color: rgba(0, 212, 255, 0.6);
            color: #e5f6ff;
        }

        .subject-btn.active {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 8px 22px rgba(0, 212, 255, 0.3);
        }

        .subject-count {
            font-size: 0.8em;
            padding: 3px 8px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.25);
        }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }

        .work-card {
            background: linear-gradient(145deg, rgba(22, 33, 62, 0.9), rgba(26, 26, 46, 0.9));
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .subject-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0, 212, 255, 0.35);
            background: rgba(0, 212, 255, 0.12);
            color: #c2ecff;
            font-size: 0.75em;
            letter-spacing: 0.2px;
            max-width: calc(100% - 32px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .work-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .work-card:hover::before {
            left: 100%;
        }

        .work-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.3);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .work-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            margin-top: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .work-card:hover .work-icon {
            transform: rotate(10deg) scale(1.1);
        }

        .work-date {
            font-size: 0.9em;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .work-title {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #fff;
        }

        .work-description {
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .work-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            font-size: 0.85em;
            color: #00d4ff;
        }

        .tag.gold {
            background: rgba(201, 162, 39, 0.15);
            border-color: rgba(201, 162, 39, 0.4);
            color: #e8d48b;
        }

        .work-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .work-link:hover {
            background: linear-gradient(135deg, #00e5ff, #00aadd);
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        .work-link.gold {
            background: linear-gradient(135deg, #c9a227, #8b7317);
        }

        .work-link.gold:hover {
            background: linear-gradient(135deg, #e8d48b, #c9a227);
            box-shadow: 0 5px 15px rgba(201, 162, 39, 0.4);
        }

        .footer {
            text-align: center;
            padding: 60px 20px 40px;
            color: #666;
        }

        .footer a {
            color: #00d4ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: #00e5ff;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 15px;
            min-width: 150px;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: #a0a0a0;
            margin-top: 5px;
        }

        .empty-state {
            margin-top: 30px;
            padding: 40px;
            border-radius: 18px;
            border: 1px dashed rgba(0, 212, 255, 0.4);
            text-align: center;
            color: #9bc9dc;
            background: rgba(0, 212, 255, 0.06);
            display: none;
        }

        @keyframes pulse-badge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @media (max-width: 768px) {
            .works-grid {
                grid-template-columns: 1fr;
                margin-top: 36px;
            }

            .subject-filter {
                justify-content: flex-start;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 6px;
            }

            .subject-btn {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 id="mainTitle">💼 Портфолио работ</h1>
                <p class="subtitle">Практические работы по нескольким предметам</p>
                <div class="student-info">
                    <strong>Головкин Илья</strong> • Группа 9/3 РПО 23/2
                </div>
            </div>
        </header>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="workCount">0</div>
                <div class="stat-label">Практических работ</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="subjectCount">0</div>
                <div class="stat-label">Предметов</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="tagCount">0</div>
                <div class="stat-label">Тематических тегов</div>
            </div>
        </div>

        <div class="subject-filter" id="subjectFilter"></div>
        <div class="works-grid" id="worksGrid"></div>
        <div class="empty-state" id="emptyState">По выбранному предмету пока нет практических работ.</div>

        <footer class="footer">
            <p style="margin-top: 10px;">
                <a href="https://github.com" target="_blank">GitHub</a> •
                Hosted on GitHub Pages
            </p>
        </footer>
    </div>

    <script>
        const works = [
            {
                url: 'quality-systems/operator_manual_practice_work_2.html',
                date: '14 марта 2026',
                title: 'Руководство оператора (Практическая №2)',
                description: 'Практическая работа с оформлением руководства оператора по ГОСТ 19.505-79: назначение, условия выполнения, порядок запуска и сообщения оператору.',
                icon: '🧪',
                subject: 'Обеспечение качества функционирования компьютерных систем',
                tags: ['ГОСТ 19.505-79', 'Руководство оператора', 'Эксплуатация ПО']
            },
            {
                url: '12-10-2025/main-2.html',
                date: '10 декабря 2025',
                title: 'План коммуникаций — Банк «Прогресс»',
                description: 'Интерактивный план коммуникаций для проекта мобильного банковского приложения. Включает матрицу стейкхолдеров, каналы связи и диаграмму информационных потоков.',
                icon: '🏦',
                iconStyle: 'background: linear-gradient(135deg, #c9a227, #8b7317);',
                linkVariant: 'gold',
                subject: 'Проектные коммуникации',
                tags: [
                    { label: 'Three.js', variant: 'gold' },
                    { label: 'WebGL', variant: 'gold' },
                    { label: 'Коммуникации' },
                    { label: 'Банкинг' }
                ]
            },
            {
                url: '12-24-2025/main.html',
                date: '24 декабря 2025',
                title: 'Устав проекта EduTrack',
                description: 'Профессиональный устав проекта для образовательного приложения EduTrack. Система управления персональным обучением и карьерой для студентов колледжей.',
                icon: '🛠️',
                subject: 'Управление программными проектами',
                tags: ['Устав проекта', 'Риск-анализ', 'Управление проектами']
            },
            {
                url: '12-10-2025/main.html',
                date: '10 декабря 2025',
                title: 'Оценка трудоемкости и сроков разработки ПО',
                description: 'Интерактивная работа по планированию проекта мобильного приложения. Включает декомпозицию задач, расчет трудоемкости, диаграмму Ганта и анализ рисков.',
                icon: '🔧',
                subject: 'Управление программными проектами',
                tags: ['Планирование', 'Оценка проектов', 'Интерактив', 'Диаграмма Ганта']
            },
            {
                url: '12-3-2025/main.html',
                date: '3 декабря 2025',
                title: 'Проект «Корпоративная доска заметок»',
                description: 'Устав проекта, WBS и прогноз рисков для корпоративной доски заметок (ToDo Board) на WPF и SQL Server.',
                icon: '📊',
                subject: 'Программная инженерия',
                tags: ['WBS', 'Риски', 'WPF', 'SQL Server']
            }
        ];

        const subjectMeta = {
            'Обеспечение качества функционирования компьютерных систем': { icon: '🛡️' },
            'Проектные коммуникации': { icon: '💬' },
            'Управление программными проектами': { icon: '📌' },
            'Программная инженерия': { icon: '🧩' }
        };

        let selectedSubject = 'all';

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                container.appendChild(particle);
            }
        }

        function openWork(url) {
            globalThis.location.href = url;
        }

        function buildSubjectButtons() {
            const countsBySubject = new Map();
            works.forEach((work) => {
                const current = countsBySubject.get(work.subject) || 0;
                countsBySubject.set(work.subject, current + 1);
            });

            const buttons = [
                { id: 'all', title: 'Все предметы', count: works.length, icon: '📚' },
                ...Array.from(countsBySubject.entries()).map(([subject, count]) => ({
                    id: subject,
                    title: subject,
                    count,
                    icon: subjectMeta[subject]?.icon || '📘'
                }))
            ];

            const subjectFilter = document.getElementById('subjectFilter');
            subjectFilter.innerHTML = buttons.map((button) => `
                <button class="subject-btn${button.id === selectedSubject ? ' active' : ''}" data-subject="${button.id}">
                    <span>${button.icon} ${button.title}</span>
                    <span class="subject-count">${button.count}</span>
                </button>
            `).join('');

            subjectFilter.querySelectorAll('.subject-btn').forEach((button) => {
                button.addEventListener('click', () => {
                    selectedSubject = button.dataset.subject;
                    buildSubjectButtons();
                    renderWorks();
                });
            });
        }

        function renderWorks() {
            const worksGrid = document.getElementById('worksGrid');
            const emptyState = document.getElementById('emptyState');
            const filteredWorks = selectedSubject === 'all'
                ? works
                : works.filter((work) => work.subject === selectedSubject);

            worksGrid.innerHTML = filteredWorks.map((work) => {
                const tagsHtml = work.tags.map((tag) => {
                    const normalizedTag = typeof tag === 'string' ? { label: tag } : tag;
                    const tagClass = normalizedTag.variant === 'gold' ? 'tag gold' : 'tag';
                    return `<span class="${tagClass}">${normalizedTag.label}</span>`;
                }).join('');

                const linkClass = work.linkVariant === 'gold' ? 'work-link gold' : 'work-link';
                const iconStyle = work.iconStyle ? ` style="${work.iconStyle}"` : '';
                const subjectIcon = subjectMeta[work.subject]?.icon || '📘';

                return `
                    <article class="work-card" data-url="${work.url}">
                        <div class="subject-badge">${subjectIcon} ${work.subject}</div>
                        <div class="work-icon"${iconStyle}>${work.icon}</div>
                        <div class="work-date">${work.date}</div>
                        <h3 class="work-title">${work.title}</h3>
                        <p class="work-description">${work.description}</p>
                        <div class="work-tags">${tagsHtml}</div>
                        <a href="${work.url}" class="${linkClass}" onclick="event.stopPropagation()">
                            Открыть работу →
                        </a>
                    </article>
                `;
            }).join('');

            worksGrid.querySelectorAll('.work-card').forEach((card) => {
                card.addEventListener('click', () => openWork(card.dataset.url));
            });

            emptyState.style.display = filteredWorks.length ? 'none' : 'block';
        }

        function typeWriter() {
            const title = document.getElementById('mainTitle');
            const originalText = title.textContent;
            title.textContent = '';
            let i = 0;

            const interval = setInterval(() => {
                if (i < originalText.length) {
                    title.textContent += originalText.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 80);
        }

        function animateCounter(target) {
            const counter = document.getElementById('workCount');
            let current = 0;

            const interval = setInterval(() => {
                if (current < target) {
                    current++;
                    counter.textContent = current;
                } else {
                    clearInterval(interval);
                }
            }, 200);
        }

        function fillStats() {
            const uniqueSubjects = new Set(works.map((work) => work.subject)).size;
            const uniqueTags = new Set();
            works.forEach((work) => {
                work.tags.forEach((tag) => {
                    uniqueTags.add(typeof tag === 'string' ? tag : tag.label);
                });
            });

            document.getElementById('subjectCount').textContent = uniqueSubjects;
            document.getElementById('tagCount').textContent = uniqueTags.size;
            animateCounter(works.length);
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            buildSubjectButtons();
            renderWorks();
            fillStats();
            typeWriter();
        });
    </script>
    <script src="nav-header.js"></script>
</body>
</html>
